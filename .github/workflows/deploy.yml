name: Deploy Laravel Vite React

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3️⃣ Install NPM Dependencies & Build Vite
      - name: Install & Build Assets
        run: |
          npm ci
          npm run build

      # 4️⃣ Fix permission & pull latest code di VPS
      - name: Pull latest code on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/POS-Harumnya

            # FIX UTAMA: Ubah kepemilikan SELURUH direktori ke user SSH (misal: ubuntu/deployer)
            # Ini agar folder .git/ bisa ditulisi saat 'git fetch'
            sudo chown -R $USER:$USER .

            # Beritahu Git bahwa direktori ini aman (mencegah error 'dubious ownership')
            git config --global --add safe.directory /var/www/POS-Harumnya

            git fetch origin main
            git reset --hard origin/main

      # 5️⃣ Upload build folder to VPS
      - name: Upload build folder to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "public/build"
          target: "/var/www/POS-Harumnya"
          overwrite: true

      # 6️⃣ Finalize deployment
      - name: Install Composer & Optimize
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/POS-Harumnya

            # Install composer production
            composer install --no-dev --optimize-autoloader

            # Clear & rebuild cache
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # KEMBALIKAN PERMISSION: Web server (www-data) butuh akses tulis ke folder tertentu
            sudo chown -R www-data:www-data storage bootstrap/cache public/build
            sudo chmod -R 775 storage bootstrap/cache public/build

            # Restart services (Gunakan reload agar tidak ada downtime)
            sudo systemctl restart php8.4-fpm
            sudo systemctl reload nginx
